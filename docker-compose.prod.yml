version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_agent_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-ai_agent}

    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_agent_backend_prod
    restart: always
    ports:
      - '3001:3001'
    environment:
      # Automatically point to the Coolify db container
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-ai_agent}?schema=public
      
      # Environment variables that should be set in Coolify UI
      # Coolify automatically injects all variables defined in its dashboard,
      # so we don't need to list OPENAI_*, TWILIO_*, etc. here manually.
    depends_on:
      - db

volumes:
  pgdata_prod:
