version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_agent
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20
    container_name: ai_agent_backend
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/ai_agent?schema=public
    env_file:
      - ./backend/.env
    command: bash -c "npm ci && npx prisma generate && npx prisma db push && npm run start:dev"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  backend_node_modules:
